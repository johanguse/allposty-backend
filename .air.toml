root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o tmp/api ./cmd/api"
  bin = "tmp/api"
  delay = 1000
  exclude_dir = ["tmp", "vendor", ".specs", ".github", "migrations"]
  include_ext = ["go", "env"]
  kill_delay = "0s"
  log = "build-errors.log"
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[proxy]
  app_port = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = false
  keep_history = true
