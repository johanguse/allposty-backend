version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/allposty/allposty-backend

issues:
  exclude-rules:
    # Allow unused parameters in handler functions (fiber.Ctx pattern)
    - path: internal/handlers
      linters: [unparam]
    # Allow long lines in generated files
    - path: _test\.go
      linters: [errcheck]
